<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marketing Hub — New Age AI</title>
<meta name="description" content="AI-powered marketing prompt hub for New Age AI team">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0A0E;--sb:#111118;--card:#16161F;--b:rgba(255,255,255,.07);--acc:#7C6FFF;--acc2:#9789FF;--t1:#F4F4F8;--t2:#8B8BA0;--t3:#55556B;--ok:#34D399;--err:#F87171;--inp:#0F0F17}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden}
input,select,textarea,button{font-family:inherit;font-size:14px}
button{cursor:pointer}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:12px}
.ring{width:32px;height:32px;border:2px solid rgba(124,111,255,.2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
#auth{display:none;align-items:center;justify-content:center;height:100vh;padding:24px}
.abox{background:var(--sb);border:1px solid var(--b);border-radius:16px;padding:32px 36px;width:100%;max-width:400px}
.alogo{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
.aicon{width:34px;height:34px;border-radius:9px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:17px}
.atabs{display:flex;background:var(--inp);border-radius:9px;padding:3px;gap:3px;margin-bottom:20px}
.atab{flex:1;padding:7px;border:none;background:transparent;color:var(--t2);border-radius:7px;font-weight:500;transition:.15s;font-size:13.5px}
.atab.active{background:var(--card);color:var(--t1)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px}
.field input{width:100%;padding:9px 12px;background:var(--inp);border:1px solid var(--b);border-radius:8px;color:var(--t1);outline:none;transition:.15s}
.field input:focus{border-color:var(--acc)}
.btnp{width:100%;padding:10px;background:var(--acc);border:none;border-radius:8px;color:#fff;font-weight:600;font-size:14px;transition:.15s;margin-top:4px}
.btnp:hover{background:var(--acc2)}
.btnp:disabled{opacity:.5;cursor:default}
.emsg{color:var(--err);font-size:12px;margin-top:7px}
.omsg{color:var(--ok);font-size:12px;margin-top:7px}
#app{display:none;height:100vh}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:215px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;height:100vh}
.sbtop{padding:16px 12px 12px;border-bottom:1px solid var(--b)}
.sbbrand{display:flex;align-items:center;gap:9px}
.sbicon{width:28px;height:28px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sbnav{padding:10px 6px;flex:1;overflow-y:auto}
.sblabel{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:0 9px;margin-bottom:5px;display:block}
.sbi{display:flex;align-items:center;gap:8px;width:100%;padding:8px 9px;border-radius:8px;border:none;background:transparent;color:var(--t2);text-align:left;transition:.15s;cursor:pointer}
.sbi:hover{background:rgba(255,255,255,.04);color:var(--t1)}
.sbi.active{background:rgba(124,111,255,.12);color:var(--acc)}
.sbdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sbil{flex:1;font-size:12.5px}
.sbcnt{font-size:10.5px;padding:2px 6px;border-radius:99px;background:rgba(255,255,255,.06);color:var(--t3)}
.sbi.active .sbcnt{background:rgba(124,111,255,.18);color:var(--acc)}
.sbdiv{height:1px;background:var(--b);margin:8px 0}
.sbbottom{padding:8px 6px;border-top:1px solid var(--b)}
.uchip{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;background:rgba(255,255,255,.03)}
.uav{width:26px;height:26px;border-radius:6px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.uem{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uro{font-size:9.5px;color:var(--t3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:13px 22px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tbtitle{font-size:16px;font-weight:700}
.tbsub{font-size:12px;color:var(--t2);margin-top:2px}
.content{flex:1;overflow-y:auto;padding:18px 22px}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:11px}
.tcard{background:var(--card);border:1px solid var(--b);border-radius:11px;padding:15px 17px;cursor:pointer;text-align:left;transition:.15s;display:flex;flex-direction:column;gap:8px;width:100%}
.tcard:hover{background:#1a1a26;outline:1px solid rgba(124,111,255,.3)}
.catbadge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;display:inline-block}
.swrap{position:relative}
.swrap input{padding:8px 12px 8px 32px;background:var(--card);border:1px solid var(--b);border-radius:8px;color:var(--t1);outline:none;width:220px;font-size:13px}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.4}
.rlayout{display:flex;flex:1;overflow:hidden}
.rinputs{width:310px;flex-shrink:0;border-right:1px solid var(--b);padding:18px;overflow-y:auto}
.routput{flex:1;padding:18px 22px;overflow-y:auto}
.slabel{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:block}
.vfield{margin-bottom:13px}
.vlabel{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px}
.vkey{font-size:9.5px;color:var(--t3);font-family:monospace;margin-left:4px}
.vinput{width:100%;padding:9px 11px;background:var(--card);border:1px solid var(--b);border-radius:8px;color:var(--t1);outline:none;transition:.15s;font-size:13px}
.vinput:focus{border-color:var(--acc)}
.bgen{width:100%;padding:11px;background:var(--acc);border:none;border-radius:8px;color:#fff;font-weight:600;font-size:13.5px;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.bgen:hover:not(:disabled){background:var(--acc2)}
.bgen:disabled{opacity:.5;cursor:default}
.obox{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:16px 18px;white-space:pre-wrap;font-size:13px;line-height:1.7;color:var(--t1)}
.oacts{display:flex;gap:7px;margin-bottom:12px}
.bsm{display:flex;align-items:center;gap:4px;padding:5px 11px;background:var(--card);border:1px solid var(--b);border-radius:6px;color:var(--t2);font-size:12px;cursor:pointer}
.bsm:hover{color:var(--t1);border-color:rgba(255,255,255,.18)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);gap:8px;text-align:center}
.eicon{width:48px;height:48px;border-radius:12px;background:rgba(124,111,255,.1);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:4px}
.backbtn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--t2);font-size:12.5px;padding:0;margin-right:10px;cursor:pointer}
.backbtn:hover{color:var(--t1)}
.tbleft{display:flex;align-items:center}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.scard{background:var(--card);border:1px solid var(--b);border-radius:9px;padding:13px 15px}
.slbl{font-size:10.5px;color:var(--t3);margin-bottom:4px}
.sval{font-size:24px;font-weight:700;color:var(--t1)}
.ssub{font-size:10.5px;color:var(--t2);margin-top:3px}
.twrap{background:var(--card);border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-bottom:16px}
.thead{padding:12px 15px;border-bottom:1px solid var(--b);font-size:13px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{font-size:10.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;text-align:left;padding:9px 14px;border-bottom:1px solid var(--b)}
td{font-size:12.5px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t2)}
td:first-child{color:var(--t1);font-weight:500}
tr:last-child td{border-bottom:none}
.rbadge{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:600}
.radmin{background:rgba(124,111,255,.18);color:var(--acc)}
.ruser{background:rgba(255,255,255,.06);color:var(--t3)}
.btiny{padding:3px 9px;border-radius:5px;font-size:10.5px;font-weight:500;border:1px solid var(--b);background:transparent;color:var(--t2);cursor:pointer}
.btiny.promote{color:var(--acc);border-color:rgba(124,111,255,.3)}
.ssec{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:16px 18px;margin-bottom:14px}
.stitle{font-size:13px;font-weight:600;margin-bottom:10px}
.srow{display:flex;gap:8px;align-items:center}
.srow input{flex:1;padding:9px 11px;background:var(--inp);border:1px solid var(--b);border-radius:8px;color:var(--t1);outline:none;font-size:13px}
.srow button{padding:9px 15px;background:var(--acc);border:none;border-radius:8px;color:#fff;font-weight:600;font-size:12.5px;cursor:pointer}
.nokey{margin-top:10px;padding:9px 11px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:7px;font-size:11.5px;color:var(--err)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
</style>
</head>
<body>

<div id="loading">
  <div class="ring"></div>
  <div style="font-size:13px;color:var(--t2)">Loading Marketing Hub…</div>
</div>

<div id="auth">
  <div class="abox">
    <div class="alogo">
      <div class="aicon">⚡</div>
      <div><div style="font-size:14px;font-weight:700">Marketing Hub</div><div style="font-size:10.5px;color:var(--t3)">New Age AI</div></div>
    </div>
    <div class="atabs">
      <button class="atab active" onclick="switchTab('login')">Login</button>
      <button class="atab" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="lf">
      <div class="field"><label>Email</label><input type="email" id="lem" placeholder="you@newageai.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="lpw" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btnp" id="lbtn" onclick="doLogin()">Login</button>
      <div id="lerr" class="emsg"></div>
    </div>
    <div id="sf" style="display:none">
      <div class="field"><label>Full Name</label><input type="text" id="sname" placeholder="Your name"/></div>
      <div class="field"><label>Email</label><input type="email" id="sem" placeholder="you@newageai.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="spw" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')doSignup()"/></div>
      <button class="btnp" id="sbtn" onclick="doSignup()">Create Account</button>
      <div id="serr" class="emsg"></div>
      <div id="sok" class="omsg"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="sbtop">
        <div class="sbbrand">
          <div class="sbicon">⚡</div>
          <div><div style="font-size:13px;font-weight:700">Marketing Hub</div><div style="font-size:10px;color:var(--t3)">New Age AI</div></div>
        </div>
      </div>
      <nav class="sbnav">
        <span class="sblabel">Categories</span>
        <div id="sbcats"></div>
        <div class="sbdiv"></div>
        <div id="sbadmin" style="display:none">
          <button class="sbi" id="sbadminbtn" onclick="showView('admin')">
            <span style="font-size:13px">🛡</span><span class="sbil">Admin Panel</span>
          </button>
        </div>
      </nav>
      <div class="sbbottom">
        <div class="uchip">
          <div class="uav" id="uav">?</div>
          <div style="flex:1;min-width:0">
            <div class="uem" id="uem">—</div>
            <div class="uro" id="uro">user</div>
          </div>
          <button onclick="doLogout()" title="Sign out" style="background:none;border:none;color:var(--t3);font-size:15px;padding:2px;cursor:pointer">↩</button>
        </div>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>

<script>
const SBU='https://xvucakstcmtfoanmgcql.supabase.co';
const SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2dWNha3N0Y210Zm9hbm1nY3FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczMjI0NjUsImV4cCI6MjA4Mjg5ODQ2NX0.7Uh38WHaPfrgp9lxX-BG7PXehR_-2ETG4cyQ55YfD-o';

let db,CU=null,CP=null,AK=null,selCat='all',AT=null,VV={},AIR='',Q='';

const CATS=[
  {id:'all',label:'All Templates',color:'#7C6FFF'},
  {id:'google-ads',label:'Google Ads',color:'#4285F4'},
  {id:'seo',label:'SEO',color:'#34A853'},
  {id:'meta-ads',label:'Meta Ads',color:'#0866FF'},
  {id:'marketing-automation',label:'Automation',color:'#F59E0B'},
  {id:'blog',label:'Blog & Content',color:'#EC4899'},
  {id:'app-marketing',label:'App Marketing',color:'#06B6D4'},
  {id:'lead-gen',label:'Lead Generation',color:'#F97316'},
];

const T=[
  // ── GOOGLE ADS ──
  {id:'ga-1',cat:'google-ads',title:'Search Ad Copy (RSA)',desc:'10 headlines & 4 descriptions with char counts',
   prompt:`You are a Google Ads expert. Create RSA copy for:\nBusiness: [BUSINESS]\nKeyword: [KEYWORD]\nUSP: [USP]\nCTA: [CTA]\n\nGenerate 10 headlines (≤30 chars, show count) and 4 descriptions (≤90 chars, show count). Mark top 3 headlines with ★.`,
   vars:[{k:'BUSINESS',l:'Business / Product',p:'e.g., New Age AI app development'},{k:'KEYWORD',l:'Target Keyword',p:'e.g., iOS app development company'},{k:'USP',l:'Unique Selling Point',p:'e.g., Delivered in 30 days, fixed price'},{k:'CTA',l:'Call to Action',p:'e.g., Get Free Quote'}]},
  {id:'ga-2',cat:'google-ads',title:'Keyword Research Brief',desc:'Match types, CPCs, negatives & ad group structure',
   prompt:`Google Ads specialist. Keyword brief for:\nIndustry: [INDUSTRY]\nProduct: [PRODUCT]\nLocation: [LOCATION]\nBudget: [BUDGET]\n\nProvide: 15 exact match, 10 phrase match, 5 broad keywords, 10 negative keywords, CPC range, and ad group structure.`,
   vars:[{k:'INDUSTRY',l:'Industry',p:'Mobile app development'},{k:'PRODUCT',l:'Service',p:'iOS & Android app development'},{k:'LOCATION',l:'Target Location',p:'India, US, UK'},{k:'BUDGET',l:'Monthly Budget',p:'₹50,000'}]},
  {id:'ga-3',cat:'google-ads',title:'Campaign Performance Audit',desc:'Diagnose metrics & get a 5-point action plan',
   prompt:`Google Ads expert. Analyze:\nCampaign: [CAMPAIGN] | Type: [TYPE] | Goal: [GOAL]\nImpressions: [IMP] | Clicks: [CLICKS] | CTR: [CTR] | CPC: [CPC] | Conversions: [CONV] | Cost: [COST]\n\nDiagnose, give top 5 optimizations, budget reallocation, 30-day plan.`,
   vars:[{k:'CAMPAIGN',l:'Campaign Name',p:'App Dev Leads Q2'},{k:'TYPE',l:'Campaign Type',p:'Search / PMax'},{k:'GOAL',l:'Goal',p:'Lead generation'},{k:'IMP',l:'Impressions',p:'45,000'},{k:'CLICKS',l:'Clicks',p:'1,200'},{k:'CTR',l:'CTR',p:'2.67%'},{k:'CPC',l:'Avg CPC',p:'₹18.50'},{k:'CONV',l:'Conversions',p:'45'},{k:'COST',l:'Total Cost',p:'₹22,200'}]},
  {id:'ga-4',cat:'google-ads',title:'App Install Campaign Copy',desc:'UAC headlines, descriptions & asset ideas for app installs',
   prompt:`Google Ads UAC specialist. Create app install campaign assets for:\nApp Name: [APP]\nPlatform: [PLATFORM]\nTarget User: [USER]\nKey Feature: [FEATURE]\nCountry: [COUNTRY]\n\nGenerate: 5 headlines (≤30 chars), 5 descriptions (≤90 chars), 3 image concept ideas, 1 video script outline (15 sec). Focus on install intent.`,
   vars:[{k:'APP',l:'App Name',p:'e.g., FitTrack'},{k:'PLATFORM',l:'Platform',p:'iOS / Android / Both'},{k:'USER',l:'Target User',p:'e.g., fitness enthusiasts 18–35'},{k:'FEATURE',l:'Key Feature',p:'e.g., AI workout plans in 60 seconds'},{k:'COUNTRY',l:'Target Country',p:'India / US / UAE'}]},

  // ── SEO ──
  {id:'seo-1',cat:'seo',title:'Meta Title & Description',desc:'3 options each, character-counted & optimized',
   prompt:`SEO expert. Write meta tags for:\nPage: [PAGE] | Keyword: [KW] | Secondary: [SKW] | Brand: [BRAND]\n\nGenerate 3 title options (50–60 chars, show count) and 3 description options (150–160 chars). Recommend best combo with reasoning.`,
   vars:[{k:'PAGE',l:'Page Type',p:'Service page / Blog / Homepage'},{k:'KW',l:'Primary Keyword',p:'iOS app development company India'},{k:'SKW',l:'Secondary Keywords',p:'mobile app developers, app development cost'},{k:'BRAND',l:'Brand',p:'New Age AI'}]},
  {id:'seo-2',cat:'seo',title:'Blog Post SEO Brief',desc:'Full outline, LSI keywords & word counts per section',
   prompt:`SEO content strategist. Blog brief for:\nKeyword: [KW] | Intent: [INTENT] | Audience: [AUD] | Words: [WC]\n\nProvide: 3 H1 options, full H2/H3 outline with word counts, 15 LSI keywords, featured snippet tip, internal linking suggestions, meta tags.`,
   vars:[{k:'KW',l:'Target Keyword',p:'how much does it cost to build an app'},{k:'INTENT',l:'Search Intent',p:'Informational / Transactional'},{k:'AUD',l:'Target Audience',p:'startup founders, entrepreneurs'},{k:'WC',l:'Word Count',p:'2500 words'}]},
  {id:'seo-3',cat:'seo',title:'On-Page SEO Audit',desc:'Score out of 100 with specific fix recommendations',
   prompt:`On-page SEO expert. Audit:\nURL: [URL] | Keyword: [KW] | Title: [TITLE] | H1: [H1] | Content: [CONTENT]\n\nScore each area out of 100 (title, meta, headers, keyword use, URL, links, images, schema). Give specific fixes for each.`,
   vars:[{k:'URL',l:'Page URL',p:'https://newageai.com/services/ios-development'},{k:'KW',l:'Target Keyword',p:'iOS app development company'},{k:'TITLE',l:'Current Title',p:'iOS App Development – New Age AI'},{k:'H1',l:'H1 Tag',p:'iOS App Development Company'},{k:'CONTENT',l:'Content Summary',p:'Page about iOS app development services...'}]},
  {id:'seo-4',cat:'seo',title:'Competitor Content Gap',desc:'Find keyword & topic gaps vs competitors',
   prompt:`SEO strategist. Content gap analysis:\nMy Brand: [BRAND] | My Topics: [TOPICS]\nComp 1: [C1] | Comp 2: [C2]\n\nIdentify: missing topics, top 10 keyword opportunities, quick-win content pieces, content types working for competitors, 3-month strategy.`,
   vars:[{k:'BRAND',l:'My Brand',p:'New Age AI, newageai.com'},{k:'TOPICS',l:'My Topics',p:'iOS development, Android apps, AI apps'},{k:'C1',l:'Competitor 1',p:'Appinventiv, appinventiv.com'},{k:'C2',l:'Competitor 2',p:'Techugo, techugo.com'}]},
  {id:'seo-5',cat:'seo',title:'Local SEO Strategy',desc:'Google Business, local keywords & citation plan',
   prompt:`Local SEO expert. Build local SEO strategy for:\nBusiness: [BIZ] | City: [CITY] | Services: [SERVICES] | Current Ranking: [RANK]\n\nProvide: Google Business Profile optimization checklist, 15 local keywords with intent, citation building plan (top 10 directories), review generation strategy, local content ideas.`,
   vars:[{k:'BIZ',l:'Business Name',p:'New Age AI'},{k:'CITY',l:'Target City',p:'Mumbai / Bangalore / Delhi'},{k:'SERVICES',l:'Services',p:'iOS app development, Android development'},{k:'RANK',l:'Current Ranking',p:'Not ranking / Page 2 for main keyword'}]},

  // ── META ADS ──
  {id:'meta-1',cat:'meta-ads',title:'Facebook/Instagram Ad Copy',desc:'Feed, Story & Carousel with hooks and CTAs',
   prompt:`Meta Ads specialist. Write ad copy for:\nProduct: [PRODUCT] | Audience: [AUD] | Objective: [OBJ] | Offer: [OFFER] | Tone: [TONE]\n\nGenerate:\n1. FEED AD: primary text (125 chars), headline (40 chars), description (30 chars)\n2. STORY AD: 3-line punchy copy with hook\n3. CAROUSEL (3 cards): Problem→Solution→CTA\n4. Top 3 CTA button recommendations`,
   vars:[{k:'PRODUCT',l:'Product / Service',p:'iOS & Android app development'},{k:'AUD',l:'Target Audience',p:'Startup founders, SMB owners 28–45'},{k:'OBJ',l:'Objective',p:'Lead gen / App installs'},{k:'OFFER',l:'Offer',p:'Free consultation + app cost calculator'},{k:'TONE',l:'Tone',p:'Professional, Bold'}]},
  {id:'meta-2',cat:'meta-ads',title:'Audience Targeting Strategy',desc:'Core, lookalike & custom audiences for full funnel',
   prompt:`Meta audience strategist. Build targeting for:\nBusiness: [BIZ] | Goal: [GOAL] | Budget: [BUDGET] | Countries: [COUNTRIES]\n\nCreate: 3 core segments with size estimate, lookalike strategy, custom audience plan, TOFU/MOFU/BOFU targeting, exclusions, 2-week A/B test plan.`,

function cc(id){return CATS.find(c=>c.id===id)?.color||'#7C6FFF'}
function cl(id){return CATS.find(c=>c.id===id)?.label||id}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function switchTab(t){
  document.querySelectorAll('.atab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='signup')));
  document.getElementById('lf').style.display=t==='login'?'':'none';
  document.getElementById('sf').style.display=t==='signup'?'':'none';
}

async function doLogin(){
  const em=document.getElementById('lem').value.trim(),pw=document.getElementById('lpw').value;
  const btn=document.getElementById('lbtn'),err=document.getElementById('lerr');
  err.textContent='';
  if(!em||!pw){err.textContent='Please fill in all fields.';return;}
  btn.disabled=true;btn.textContent='Logging in…';
  const {error}=await db.auth.signInWithPassword({email:em,password:pw});
  if(error){err.textContent=error.message;btn.disabled=false;btn.textContent='Login';}
}

async function doSignup(){
  const nm=document.getElementById('sname').value.trim(),em=document.getElementById('sem').value.trim(),pw=document.getElementById('spw').value;
  const btn=document.getElementById('sbtn'),err=document.getElementById('serr'),ok=document.getElementById('sok');
  err.textContent='';ok.textContent='';
  if(!nm||!em||!pw){err.textContent='Please fill in all fields.';return;}
  if(pw.length<6){err.textContent='Password must be at least 6 characters.';return;}
  btn.disabled=true;btn.textContent='Creating account…';
  const {error}=await db.auth.signUp({email:em,password:pw,options:{data:{full_name:nm}}});
  btn.disabled=false;btn.textContent='Create Account';
  if(error)err.textContent=error.message;
  else ok.textContent='✓ Account created! Check your email to confirm, then login.';
}

async function doLogout(){
  await db.auth.signOut();
  CU=null;CP=null;AK=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth').style.display='flex';
}

async function loadProfile(){
  const {data}=await db.from('profiles').select('*').eq('id',CU.id).single();
  CP=data;
  await db.from('profiles').update({last_seen:new Date().toISOString()}).eq('id',CU.id);
}

async function loadKey(){
  const {data}=await db.from('app_settings').select('value').eq('key','anthropic_api_key').single();
  AK=data?.value||null;
}

function showApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
  const nm=CP?.full_name||CU.email;
  document.getElementById('uav').textContent=nm[0].toUpperCase();
  document.getElementById('uem').textContent=CU.email;
  document.getElementById('uro').textContent=CP?.role||'user';
  if(CP?.role==='admin')document.getElementById('sbadmin').style.display='';
  buildSB();showView('browse');
}

function buildSB(){
  document.getElementById('sbcats').innerHTML=CATS.map(c=>{
    const cnt=c.id==='all'?T.length:T.filter(t=>t.cat===c.id).length;
    return `<button class="sbi${c.id===selCat?' active':''}" onclick="selCat='${c.id}';buildSB();showView('browse')" id="sbi-${c.id}">
      <span class="sbdot" style="background:${c.color}"></span>
      <span class="sbil">${c.label}</span>
      <span class="sbcnt">${cnt}</span>
    </button>`;
  }).join('');
}

function showView(v){
  const m=document.getElementById('main');
  if(v==='browse')renderBrowse(m);
  else if(v==='run')renderRun(m);
  else if(v==='admin')renderAdmin(m);
  const ab=document.getElementById('sbadminbtn');
  if(ab)ab.classList.toggle('active',v==='admin');
}

function renderBrowse(m){
  const cat=CATS.find(c=>c.id===selCat);
  const items=T.filter(t=>{
    const cm=selCat==='all'||t.cat===selCat;
    const q=Q.toLowerCase();
    return cm&&(!q||t.title.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||cl(t.cat).toLowerCase().includes(q));
  });
  m.innerHTML=`
    <div class="topbar">
      <div><div class="tbtitle">${cat?.label||'All Templates'}</div><div class="tbsub">${items.length} template${items.length!==1?'s':''}</div></div>
      <div class="swrap">
        <span class="sico">🔎</span>
        <input type="text" placeholder="Search…" value="${Q}" oninput="Q=this.value;showView('browse')" />
      </div>
    </div>
    <div class="content">
      ${items.length===0
        ?`<div class="empty" style="height:75%"><div class="eicon">🔎</div><div style="font-size:14px;font-weight:500">No templates found</div></div>`
        :`<div class="tgrid">${items.map(t=>`
          <button class="tcard" onclick="openT('${t.id}')">
            <div><span class="catbadge" style="background:${cc(t.cat)}18;color:${cc(t.cat)}">${cl(t.cat)}</span></div>
            <div><div style="font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.3">${t.title}</div><div style="font-size:12px;color:var(--t2);line-height:1.45;margin-top:4px">${t.desc}</div></div>
            <div style="font-size:11px;color:var(--t3)">${t.vars.length} inputs →</div>
          </button>`).join('')}</div>`}
    </div>`;
}

function openT(id){
  AT=T.find(t=>t.id===id);VV={};AIR='';showView('run');
}

      <div class="tbleft">
        <button class="backbtn" onclick="showView('browse')">← Back</button>
        <div style="width:1px;height:16px;background:var(--b);margin-right:10px"></div>

      </div>
      <span class="catbadge" style="background:${cc(t.cat)}18;color:${cc(t.cat)}">${cl(t.cat)}</span>

async function runGen(){
  if(!AT)return;
  if(!AK){
    document.getElementById('routput').innerHTML=`<div style="padding:16px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:9px;color:var(--err);font-size:13px">⚠ No Anthropic API key set. Go to Admin Panel → Settings to add it.</div>`;
    return;
  }
  const btn=document.getElementById('gbtn'),out=document.getElementById('routput');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Generating…';
  out.innerHTML=`<div style="display:flex;align-items:center;gap:9px;color:var(--t2);font-size:13px"><div style="width:6px;height:6px;border-radius:50%;background:var(--acc);animation:pulse 1s infinite"></div>Claude is thinking…</div>`;
  let p=AT.prompt;
  for(const v of AT.vars) p=p.replaceAll(`[${v.k}]`,VV[v.k]||`[${v.k}]`);
  try{
    // Use serverless proxy to avoid CORS
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:p,apiKey:AK})
    });
    const data=await res.json();
    AIR=data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||(data.error?.message||JSON.stringify(data.error)||'No response received.');
    await db.from('template_usage').insert({user_id:CU.id,user_email:CU.email,template_id:AT.id,template_title:AT.title,template_category:AT.cat});
  }catch(e){AIR='⚠ Error: '+e.message;}
  btn.disabled=false;btn.innerHTML='⚡ Generate with Claude';
  out.innerHTML=`
    <div class="oacts">
      <button class="bsm" onclick="doCopy(this)">📋 Copy</button>
      <button class="bsm" onclick="runGen()">↺ Regenerate</button>
    </div>
    <div class="obox">${esc(AIR)}</div>`;
}

function doCopy(btn){
  navigator.clipboard.writeText(AIR).catch(()=>{});
  btn.textContent='✓ Copied!';
  setTimeout(()=>btn.textContent='📋 Copy',2000);
}

async function renderAdmin(m){
  if(CP?.role!=='admin'){
    m.innerHTML=`<div class="empty" style="height:100%"><div class="eicon">🛡</div><div>Admin access required</div></div>`;return;
  }
  m.innerHTML=`<div style="padding:13px 22px;border-bottom:1px solid var(--b)"><div class="tbtitle">🛡 Admin Panel</div><div class="tbsub">User management & analytics</div></div>
  <div class="content" id="admcon"><div style="color:var(--t3);text-align:center;padding:40px">Loading…</div></div>`;
  const [{data:users},{data:usage},{data:settings}]=await Promise.all([
    db.from('profiles').select('*').order('created_at',{ascending:false}),
    db.from('template_usage').select('*').order('created_at',{ascending:false}).limit(200),
    db.from('app_settings').select('*'),
  ]);
  const today=new Date();today.setHours(0,0,0,0);
  const at=(users||[]).filter(u=>u.last_seen&&new Date(u.last_seen)>=today).length;
  const sk=(settings||[]).find(s=>s.key==='anthropic_api_key')?.value||'';
  const cm={};(usage||[]).forEach(u=>{cm[u.template_category]=(cm[u.template_category]||0)+1;});
  const tc=Object.entries(cm).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('admcon').innerHTML=`
    <div class="sgrid">
      <div class="scard"><div class="slbl">Total Users</div><div class="sval">${(users||[]).length}</div><div class="ssub">registered</div></div>
      <div class="scard"><div class="slbl">Active Today</div><div class="sval">${at}</div><div class="ssub">visited today</div></div>
      <div class="scard"><div class="slbl">Total Runs</div><div class="sval">${(usage||[]).length}</div><div class="ssub">generated</div></div>
      <div class="scard"><div class="slbl">Top Category</div><div class="sval" style="font-size:15px">${tc?cl(tc[0]):'—'}</div><div class="ssub">${tc?tc[1]+' runs':''}</div></div>
    </div>
    <div class="ssec">
      <div class="stitle">⚙ Anthropic API Key</div>
      <p style="font-size:12px;color:var(--t2);margin-bottom:10px">Get your key from <a href="https://console.anthropic.com" target="_blank" style="color:var(--acc)">console.anthropic.com</a></p>
      <div class="srow">
        <input type="password" id="akinput" value="${sk}" placeholder="sk-ant-api03-…"/>
        <button onclick="saveKey()">Save Key</button>
      </div>
      <div id="kmsg" style="font-size:12px;margin-top:7px"></div>
    </div>
    <div class="twrap">
      <div class="thead">Users (${(users||[]).length})</div>
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Last Active</th><th>Runs</th><th>Action</th></tr></thead>
        <tbody>${(users||[]).map(u=>{
          const runs=(usage||[]).filter(r=>r.user_id===u.id).length;
          const jd=u.created_at?new Date(u.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}):'—';
          const me=u.id===CU.id;
          return `<tr><td>${u.full_name||'—'}${me?' <span style="font-size:9.5px;color:var(--acc)">(you)</span>':''}</td><td style="font-size:11.5px">${u.email}</td><td><span class="rbadge ${u.role==='admin'?'radmin':'ruser'}">${u.role||'user'}</span></td><td>${jd}</td><td>${u.last_seen?tAgo(u.last_seen):'—'}</td><td>${runs}</td><td>${me?'—':`<button class="btiny${u.role==='admin'?'':' promote'}" onclick="toggleRole('${u.id}','${u.role||'user'}')">${u.role==='admin'?'Revoke':'Make Admin'}</button>`}</td></tr>`;
        }).join('')}</tbody>
      </table>
    </div>
    <div class="twrap">
      <div class="thead">Recent Activity</div>
      <table>
        <thead><tr><th>User</th><th>Template</th><th>Category</th><th>When</th></tr></thead>
        <tbody>${(usage||[]).length===0
          ?'<tr><td colspan="4" style="text-align:center;color:var(--t3);padding:20px">No activity yet</td></tr>'
          :(usage||[]).slice(0,40).map(u=>`<tr><td style="font-size:11.5px">${u.user_email||'—'}</td><td>${u.template_title||'—'}</td><td><span class="catbadge" style="background:${cc(u.template_category)}18;color:${cc(u.template_category)};font-size:10px;padding:2px 7px;border-radius:99px">${cl(u.template_category)}</span></td><td style="font-size:11.5px;color:var(--t3)">${tAgo(u.created_at)}</td></tr>`).join('')
        }</tbody>
      </table>
    </div>`;
}

async function saveKey(){
  const v=document.getElementById('akinput').value.trim(),msg=document.getElementById('kmsg');
  if(!v){msg.style.color='var(--err)';msg.textContent='Enter a valid key.';return;}
  const {error}=await db.from('app_settings').upsert({key:'anthropic_api_key',value:v,updated_at:new Date().toISOString()});
  if(error){msg.style.color='var(--err)';msg.textContent='Error: '+error.message;}
  else{msg.style.color='var(--ok)';msg.textContent='✓ Saved! All users can now generate.';AK=v;}
}

async function toggleRole(uid,role){
  const nr=role==='admin'?'user':'admin';
  await db.from('profiles').update({role:nr}).eq('id',uid);
  renderAdmin(document.getElementById('main'));
}

function tAgo(ts){
  if(!ts)return'—';
  const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000),h=Math.floor(m/60),dy=Math.floor(h/24);
  return dy>0?dy+'d ago':h>0?h+'h ago':m>0?m+'m ago':'just now';
}

// Init — load Supabase lazily
const s=document.createElement('script');
s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
s.onload=()=>{
  db=supabase.createClient(SBU,SBK);
  db.auth.onAuthStateChange(async(ev,ses)=>{
    document.getElementById('loading').style.display='none';
    if(ses?.user){
      CU=ses.user;
      await loadProfile();await loadKey();showApp();
    } else {
      document.getElementById('auth').style.display='flex';
      document.getElementById('app').style.display='none';
    }
  });
};
s.onerror=()=>{
  document.getElementById('loading').innerHTML='<div style="color:var(--err);text-align:center">Failed to load. Check your connection.</div>';
};
document.head.appendChild(s);
</script>
</body>
</html>
