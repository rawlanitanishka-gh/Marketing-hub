<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marketing Hub — New Age AI</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0E;--sb:#111118;--card:#16161F;--brd:rgba(255,255,255,.07);
  --acc:#7C6FFF;--t1:#F4F4F8;--t2:#8B8BA0;--t3:#55556B;
  --ok:#34D399;--err:#F87171;--inp:#0F0F17;
}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden}
button,input,textarea{font-family:inherit}
/* ── AUTH ── */
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50}
.abox{background:var(--sb);border:1px solid var(--brd);border-radius:16px;padding:36px 40px;width:380px}
.alogo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.aicon{width:36px;height:36px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:18px}
.atabs{display:flex;background:var(--inp);border-radius:9px;padding:3px;margin-bottom:22px;gap:3px}
.atab{flex:1;padding:8px;border:none;background:transparent;color:var(--t2);border-radius:7px;font-size:13.5px;font-weight:500;cursor:pointer;transition:.15s}
.atab.on{background:var(--card);color:var(--t1)}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px}
.fld input{width:100%;padding:10px 13px;background:var(--inp);border:1px solid var(--brd);border-radius:8px;color:var(--t1);outline:none;font-size:14px;transition:.15s}
.fld input:focus{border-color:var(--acc)}
.abtn{width:100%;padding:11px;background:var(--acc);border:none;border-radius:8px;color:#fff;font-weight:600;font-size:14px;cursor:pointer;margin-top:4px;transition:.15s}
.abtn:disabled{opacity:.5;cursor:default}
.amsg{font-size:12px;margin-top:9px;line-height:1.5}
.amsg.err{color:var(--err)} .amsg.ok{color:var(--ok)}
/* ── APP LAYOUT ── */
#app{display:none;height:100vh}
.layout{display:flex;height:100vh}
/* ── SIDEBAR ── */
.sb{width:218px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--brd);display:flex;flex-direction:column}
.sb-top{padding:16px 13px 13px;border-bottom:1px solid var(--brd)}
.sb-brand{display:flex;align-items:center;gap:9px}
.sb-ic{width:28px;height:28px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:11px 7px}
.sb-lbl{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:0 9px;margin-bottom:6px;display:block}
.sb-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 9px;border-radius:8px;border:none;background:transparent;color:var(--t2);text-align:left;cursor:pointer;transition:.15s}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--t1)}
.sb-item.on{background:rgba(124,111,255,.12);color:var(--acc)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-item-lbl{flex:1;font-size:12.5px}
.sb-cnt{font-size:10.5px;padding:2px 6px;border-radius:99px;background:rgba(255,255,255,.06);color:var(--t3)}
.sb-item.on .sb-cnt{background:rgba(124,111,255,.18);color:var(--acc)}
.sb-div{height:1px;background:var(--brd);margin:8px 0}
.sb-bot{padding:9px 7px;border-top:1px solid var(--brd)}
.uc{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;background:rgba(255,255,255,.03)}
.uc-av{width:26px;height:26px;border-radius:6px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:13px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-size:16px;font-weight:700}
.tb-sub{font-size:12px;color:var(--t2);margin-top:2px}
.content{flex:1;overflow-y:auto;padding:20px 24px}
/* ── BROWSE ── */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
.tcard{background:var(--card);border:1px solid var(--brd);border-radius:11px;padding:16px 18px;cursor:pointer;text-align:left;transition:.15s;display:flex;flex-direction:column;gap:9px;width:100%}
.tcard:hover{background:#1c1c27;border-color:rgba(124,111,255,.35)}
.badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:99px;display:inline-block}
.swrap{position:relative}
.swrap input{padding:8px 12px 8px 32px;background:var(--card);border:1px solid var(--brd);border-radius:8px;color:var(--t1);outline:none;width:230px;font-size:13px}
.swrap:before{content:'🔎';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.4;pointer-events:none}
/* ── RUN ── */
.run-wrap{display:flex;flex:1;overflow:hidden}
.run-left{width:300px;flex-shrink:0;border-right:1px solid var(--brd);padding:20px;overflow-y:auto}
.run-right{flex:1;padding:20px 24px;overflow-y:auto}
.sec-lbl{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:block}
.vf{margin-bottom:13px}
.vf label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px}
.vf .vk{font-size:9.5px;color:var(--t3);font-family:monospace;margin-left:4px}
.vf input{width:100%;padding:9px 11px;background:var(--card);border:1px solid var(--brd);border-radius:8px;color:var(--t1);outline:none;font-size:13px;transition:.15s}
.vf input:focus{border-color:var(--acc)}
.gen-btn{width:100%;padding:12px;background:var(--acc);border:none;border-radius:9px;color:#fff;font-weight:600;font-size:14px;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:.15s}
.gen-btn:hover:not(:disabled){filter:brightness(1.1)}
.gen-btn:disabled{opacity:.55;cursor:default}
.out-box{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:18px 20px;white-space:pre-wrap;font-size:13px;line-height:1.75;color:var(--t1)}
.out-acts{display:flex;gap:8px;margin-bottom:13px}
.sm-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--card);border:1px solid var(--brd);border-radius:7px;color:var(--t2);font-size:12px;cursor:pointer;transition:.15s}
.sm-btn:hover{color:var(--t1);border-color:rgba(255,255,255,.2)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);gap:9px;text-align:center}
.e-icon{width:50px;height:50px;border-radius:13px;background:rgba(124,111,255,.1);display:flex;align-items:center;justify-content:center;font-size:23px}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--t2);font-size:13px;padding:0;cursor:pointer;margin-right:12px}
.back-btn:hover{color:var(--t1)}
.tb-left{display:flex;align-items:center}
/* ── ADMIN ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px 16px}
.stat-lbl{font-size:10.5px;color:var(--t3);margin-bottom:5px}
.stat-val{font-size:26px;font-weight:700}
.stat-sub{font-size:11px;color:var(--t2);margin-top:3px}
.panel{background:var(--card);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:16px}
.panel-hd{padding:13px 16px;border-bottom:1px solid var(--brd);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.key-row{display:flex;gap:8px;padding:14px 16px;align-items:center}
.key-row input{flex:1;padding:9px 12px;background:var(--inp);border:1px solid var(--brd);border-radius:8px;color:var(--t1);outline:none;font-size:13px}
.key-row input:focus{border-color:var(--acc)}
.key-row .save-btn{padding:9px 16px;background:var(--acc);border:none;border-radius:8px;color:#fff;font-weight:600;font-size:13px;cursor:pointer}
.key-msg{padding:0 16px 12px;font-size:12px}
table{width:100%;border-collapse:collapse}
th{font-size:10.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;text-align:left;padding:10px 15px;border-bottom:1px solid var(--brd)}
td{font-size:12.5px;padding:10px 15px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t2);vertical-align:middle}
td:first-child{color:var(--t1);font-weight:500}
tr:last-child td{border-bottom:none}
.role{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:600}
.role-admin{background:rgba(124,111,255,.18);color:var(--acc)}
.role-user{background:rgba(255,255,255,.06);color:var(--t3)}
.tiny-btn{padding:3px 9px;border-radius:5px;font-size:10.5px;border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer}
.tiny-btn.promote{color:var(--acc);border-color:rgba(124,111,255,.3)}
/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,.06) 50%,var(--card) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
/* ── UTILS ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
</style>
</head>

// ── Helpers ─────────────────────────────────────────────
const catColor = id => CATS.find(c => c.id === id)?.color || '#7C6FFF';
const catLabel = id => CATS.find(c => c.id === id)?.label || id;
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const el  = id => document.getElementById(id);

// ── Auth UI ─────────────────────────────────────────────
function switchTab(tab) {
  el('tab-login').classList.toggle('on', tab === 'login');
  el('tab-signup').classList.toggle('on', tab === 'signup');
  el('form-login').style.display  = tab === 'login'  ? '' : 'none';
  el('form-signup').style.display = tab === 'signup' ? '' : 'none';
}

async function login() {
  const email = el('l-em').value.trim();
  const pw    = el('l-pw').value;
  const msg   = el('l-msg');
  msg.className = 'amsg';
  msg.textContent = '';
  if (!email || !pw) { msg.className = 'amsg err'; msg.textContent = 'Please fill in all fields.'; return; }
  el('l-btn').disabled = true;
  el('l-btn').textContent = 'Logging in…';
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  el('l-btn').disabled = false;
  el('l-btn').textContent = 'Login';
  if (error) {
    msg.className = 'amsg err';
    if (error.message.toLowerCase().includes('confirm')) {
      msg.textContent = 'Email not confirmed. Check your inbox for a confirmation link, or ask the admin to disable email confirmation in Supabase Auth settings.';
    } else if (error.message.toLowerCase().includes('invalid')) {
      msg.textContent = 'Incorrect email or password.';
    } else {
      msg.textContent = error.message;
    }
  }
}

async function signup() {
  const name  = el('s-nm').value.trim();
  const email = el('s-em').value.trim();
  const pw    = el('s-pw').value;
  const msg   = el('s-msg');
  msg.className = 'amsg';
  msg.textContent = '';
  if (!name || !email || !pw) { msg.className = 'amsg err'; msg.textContent = 'Please fill in all fields.'; return; }
  if (pw.length < 6) { msg.className = 'amsg err'; msg.textContent = 'Password must be at least 6 characters.'; return; }
  el('s-btn').disabled = true;
  el('s-btn').textContent = 'Creating account…';
  const { error } = await db.auth.signUp({ email, password: pw, options: { data: { full_name: name } } });
  el('s-btn').disabled = false;
  el('s-btn').textContent = 'Create Account';
  if (error) {
    msg.className = 'amsg err';
    msg.textContent = error.message;
  } else {
    msg.className = 'amsg ok';
    msg.textContent = '✓ Account created! If login fails, check your email for a confirmation link — or ask the admin to disable email confirmation in Supabase → Authentication → Settings.';
  }
}

async function logout() {
  await db.auth.signOut();
  CU = null; CP = null;
  el('app').style.display = 'none';
  el('auth').style.display = 'flex';
}

// ── App Init ────────────────────────────────────────────
async function loadAndShowApp(user) {
  CU = user;
  // Show app shell immediately
  el('auth').style.display = 'none';
  el('app').style.display = 'block';
  // Load profile in background
  const { data } = await db.from('profiles').select('*').eq('id', CU.id).single();
  CP = data;
  // Update last_seen fire-and-forget
  db.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', CU.id);
  // Update sidebar user info
  const name = CP?.full_name || CU.email;
  el('uc-av').textContent  = name[0].toUpperCase();
  el('uc-em').textContent  = CU.email;
  el('uc-role').textContent = CP?.role || 'user';
  if (CP?.role === 'admin') el('sb-admin-wrap').style.display = '';
  buildSidebar();
  showView('browse');
}

// ── Sidebar ─────────────────────────────────────────────
function buildSidebar() {
  el('sb-cats').innerHTML = CATS.map(c => {
    const cnt = c.id === 'all' ? TEMPLATES.length : TEMPLATES.filter(t => t.cat === c.id).length;
    return `<button class="sb-item${c.id === activeCat ? ' on' : ''}" id="sbi-${c.id}" onclick="selectCat('${c.id}')">
      <span class="sb-dot" style="background:${c.color}"></span>
      <span class="sb-item-lbl">${c.label}</span>
      <span class="sb-cnt">${cnt}</span>
    </button>`;
  }).join('');
}

function selectCat(id) {
  activeCat = id;
  document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('on'));
  const sbi = el('sbi-' + id);
  if (sbi) sbi.classList.add('on');
  showView('browse');
}

// ── Views ────────────────────────────────────────────────
function showView(view) {
  const main = el('main-area');
  if (view === 'browse') renderBrowse(main);
  else if (view === 'run')    renderRun(main);
  else if (view === 'admin')  renderAdmin(main);
  const ab = el('sb-admin-btn');
  if (ab) ab.classList.toggle('on', view === 'admin');
}

// ── Browse ───────────────────────────────────────────────
function renderBrowse(main) {
  const cat = CATS.find(c => c.id === activeCat);
  const items = TEMPLATES.filter(t => {
    const catOk = activeCat === 'all' || t.cat === activeCat;
    const q = searchQ.toLowerCase();
    const qOk = !q || t.title.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || catLabel(t.cat).toLowerCase().includes(q);
    return catOk && qOk;
  });
  main.innerHTML = `
    <div class="topbar">
      <div>
        <div class="tb-title">${cat?.label || 'All Templates'}</div>
        <div class="tb-sub">${items.length} template${items.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="swrap">
        <input type="text" placeholder="Search templates…" value="${searchQ}"
          oninput="searchQ=this.value;showView('browse')" />
      </div>
    </div>
    <div class="content">
      ${items.length === 0
        ? `<div class="empty" style="height:70%"><div class="e-icon">🔎</div><div style="font-size:14px;font-weight:500;color:var(--t2)">No templates found</div></div>`
        : `<div class="tgrid">${items.map(t => `
            <button class="tcard" onclick="openTemplate('${t.id}')">
              <span class="badge" style="background:${catColor(t.cat)}1a;color:${catColor(t.cat)}">${catLabel(t.cat)}</span>
              <div>
                <div style="font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.3">${t.title}</div>
                <div style="font-size:12px;color:var(--t2);line-height:1.45;margin-top:4px">${t.desc}</div>
              </div>
              <div style="font-size:11px;color:var(--t3)">${t.vars.length} input${t.vars.length !== 1 ? 's' : ''} required →</div>
            </button>`).join('')}
          </div>`
      }
    </div>`;
}

// ── Run ──────────────────────────────────────────────────
function openTemplate(id) {
  activeTemplate = TEMPLATES.find(t => t.id === id);
  vars = {}; result = '';
  showView('run');
}

function renderRun(main) {
  if (!activeTemplate) { showView('browse'); return; }
  const t = activeTemplate;
  main.innerHTML = `
    <div class="topbar">
      <div class="tb-left">
        <button class="back-btn" onclick="showView('browse')">← Back</button>
        <div style="width:1px;height:16px;background:var(--brd);margin-right:12px"></div>
        <div>
          <div class="tb-title" style="font-size:15px">${t.title}</div>
          <div class="tb-sub">${t.desc}</div>
        </div>
      </div>
      <span class="badge" style="background:${catColor(t.cat)}1a;color:${catColor(t.cat)}">${catLabel(t.cat)}</span>
    </div>
    <div class="run-wrap">
      <div class="run-left">
        <span class="sec-lbl">Fill in your details</span>
        ${t.vars.map(v => `
          <div class="vf">
            <label>${v.l}<span class="vk">[${v.k}]</span></label>
            <input type="text" placeholder="${v.p}" oninput="vars['${v.k}']=this.value" />
          </div>`).join('')}
        <button class="gen-btn" id="gen-btn" onclick="generate()">
          ⚡ Generate with Claude
        </button>
      </div>
      <div class="run-right" id="run-out">
        <div class="empty" style="height:100%">
          <div class="e-icon">⚡</div>
          <div style="font-size:13.5px;font-weight:500;color:var(--t2)">Fill the fields and click Generate</div>
          <div style="font-size:12px;color:var(--t3)">Your AI output will appear here</div>
        </div>
      </div>
    </div>`;
}

async function generate() {
  if (!activeTemplate) return;
  const btn = el('gen-btn');
  const out = el('run-out');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating…';
  out.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--t2);font-size:13px;padding:4px 0">
    <div style="width:7px;height:7px;border-radius:50%;background:var(--acc);animation:pulse 1s infinite;flex-shrink:0"></div>
    Claude is writing your content…
  </div>`;

  // Build prompt with variable substitution
  let prompt = activeTemplate.prompt;
  for (const v of activeTemplate.vars) {
    prompt = prompt.replaceAll(`[${v.k}]`, vars[v.k] || `[${v.k}]`);
  }

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      result = '⚠ Error: ' + (data.error?.message || data.error || 'Something went wrong.');
    } else {
      result = data.content?.filter(b => b.type === 'text').map(b => b.text).join('\n') || 'No response.';
      // Track usage — fire and forget
      db.from('template_usage').insert({
        user_id: CU.id, user_email: CU.email,
        template_id: activeTemplate.id, template_title: activeTemplate.title,
        template_category: activeTemplate.cat
      });
    }
  } catch (e) {
    result = '⚠ Network error: ' + e.message + '\n\nMake sure you are accessing the deployed Vercel URL, not opening the file locally.';
  }

  btn.disabled = false;
  btn.innerHTML = '⚡ Generate with Claude';
  out.innerHTML = `
    <div class="out-acts">
      <button class="sm-btn" onclick="copyResult(this)">📋 Copy</button>
      <button class="sm-btn" onclick="generate()">↺ Regenerate</button>
    </div>
    <div class="out-box">${esc(result)}</div>`;
}

function copyResult(btn) {
  navigator.clipboard.writeText(result).catch(() => {});
  btn.textContent = '✓ Copied!';
  setTimeout(() => btn.textContent = '📋 Copy', 2000);
}

// ── Admin ────────────────────────────────────────────────
async function renderAdmin(main) {
  if (CP?.role !== 'admin') {
    main.innerHTML = `<div class="empty" style="height:100%"><div class="e-icon">🛡</div><div style="color:var(--t2)">Admin access required</div></div>`;
    return;
  }

  // Show skeleton instantly
  main.innerHTML = `
    <div class="topbar">
      <div><div class="tb-title">🛡 Admin Panel</div><div class="tb-sub">User management & analytics</div></div>
      <button onclick="testAPIKey()" style="padding:7px 14px;background:rgba(124,111,255,.15);border:1px solid rgba(124,111,255,.3);border-radius:7px;color:var(--acc);font-size:12px;cursor:pointer;font-weight:500" id="test-btn">🔑 Test API Key</button>
    </div>
    <div class="content" id="admin-content">
      <div class="stat-grid">${[0,1,2,3].map(() =>
        `<div class="stat"><div class="skel" style="height:11px;width:55%;margin-bottom:10px"></div><div class="skel" style="height:30px;width:40%"></div></div>`
      ).join('')}</div>
      <div class="panel"><div class="panel-hd">⚙ API Key Settings</div><div class="skel" style="height:44px;margin:14px 16px;border-radius:8px"></div></div>
      <div class="panel"><div class="panel-hd">Users</div><div class="skel" style="height:160px;margin:14px 16px;border-radius:8px"></div></div>
      <div class="panel"><div class="panel-hd">Recent Activity</div><div class="skel" style="height:160px;margin:14px 16px;border-radius:8px"></div></div>
    </div>`;

  // Fetch in parallel
  const [{ data: users }, { data: usage }, { data: settings }] = await Promise.all([
    db.from('profiles').select('*').order('created_at', { ascending: false }),
    db.from('template_usage').select('*').order('created_at', { ascending: false }).limit(100),
    db.from('app_settings').select('*'),
  ]);

  const today = new Date(); today.setHours(0,0,0,0);
  const activeToday = (users||[]).filter(u => u.last_seen && new Date(u.last_seen) >= today).length;
  const savedKey = (settings||[]).find(s => s.key === 'anthropic_api_key')?.value || '';
  const catCounts = {};
  (usage||[]).forEach(u => { catCounts[u.template_category] = (catCounts[u.template_category]||0) + 1; });
  const topCat = Object.entries(catCounts).sort((a,b) => b[1]-a[1])[0];

  el('admin-content').innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Total Users</div><div class="stat-val">${(users||[]).length}</div><div class="stat-sub">registered accounts</div></div>
      <div class="stat"><div class="stat-lbl">Active Today</div><div class="stat-val">${activeToday}</div><div class="stat-sub">visited today</div></div>
      <div class="stat"><div class="stat-lbl">Total Runs</div><div class="stat-val">${(usage||[]).length}</div><div class="stat-sub">prompts generated</div></div>
      <div class="stat"><div class="stat-lbl">Top Category</div><div class="stat-val" style="font-size:15px">${topCat ? catLabel(topCat[0]) : '—'}</div><div class="stat-sub">${topCat ? topCat[1] + ' runs' : 'no data yet'}</div></div>
    </div>

    <div class="panel">
      <div class="panel-hd">
        ⚙ API Key Settings
        <span style="font-size:11px;color:var(--t3);font-weight:400">Key is hardcoded in api/generate.js — save here to override</span>
      </div>
      <div class="key-row">
        <input type="password" id="key-input" value="${savedKey}" placeholder="sk-ant-api03-… (optional override)" />
        <button class="save-btn" onclick="saveKey()">Save</button>
      </div>
      <div id="key-msg" style="padding:0 16px 12px;font-size:12px"></div>
    </div>

    <div class="panel">
      <div class="panel-hd">Users (${(users||[]).length})</div>
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Last Active</th><th>Runs</th><th>Action</th></tr></thead>
        <tbody>${(users||[]).map(u => {
          const runs = (usage||[]).filter(r => r.user_id === u.id).length;
          const joined = u.created_at ? new Date(u.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}) : '—';
          const isMe = u.id === CU.id;
          return `<tr>
            <td>${u.full_name||'—'}${isMe?` <span style="font-size:9.5px;color:var(--acc)">(you)</span>`:''}</td>
            <td style="font-size:11.5px">${u.email}</td>
            <td><span class="role role-${u.role||'user'}">${u.role||'user'}</span></td>
            <td>${joined}</td>
            <td>${u.last_seen ? timeAgo(u.last_seen) : '—'}</td>
            <td>${runs}</td>
            <td>${isMe ? '—' : `<button class="tiny-btn${u.role==='admin'?'':' promote'}" onclick="toggleRole('${u.id}','${u.role||'user'}')">${u.role==='admin'?'Revoke Admin':'Make Admin'}</button>`}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>

    <div class="panel">
      <div class="panel-hd">Recent Activity (last 50)</div>
      <table>
        <thead><tr><th>User</th><th>Template</th><th>Category</th><th>When</th></tr></thead>
        <tbody>${(usage||[]).length === 0
          ? `<tr><td colspan="4" style="text-align:center;color:var(--t3);padding:24px">No activity yet</td></tr>`
          : (usage||[]).slice(0,50).map(u => `<tr>
              <td style="font-size:11.5px">${u.user_email||'—'}</td>
              <td>${u.template_title||'—'}</td>
              <td><span class="badge" style="background:${catColor(u.template_category)}1a;color:${catColor(u.template_category)};font-size:10px;padding:2px 7px">${catLabel(u.template_category)}</span></td>
              <td style="font-size:11.5px;color:var(--t3)">${timeAgo(u.created_at)}</td>
            </tr>`).join('')
        }</tbody>
      </table>
    </div>`;
}

async function saveKey() {
  const val = el('key-input').value.trim();
  const msg = el('key-msg');
  if (!val) { msg.style.color='var(--err)'; msg.textContent='Enter a valid API key.'; return; }
  const { error } = await db.from('app_settings').upsert({ key: 'anthropic_api_key', value: val, updated_at: new Date().toISOString() });
  if (error) { msg.style.color='var(--err)'; msg.textContent='Error: '+error.message; }
  else { msg.style.color='var(--ok)'; msg.textContent='✓ Key saved successfully.'; }
}

async function testAPIKey() {
  const btn = el('test-btn');
  btn.textContent = 'Testing…'; btn.disabled = true;
  try {
    const r = await fetch('/api/generate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: 'Reply with exactly: API key is working!' })
    });
    const d = await r.json();
    const txt = d.content?.[0]?.text || d.error?.message || d.error || JSON.stringify(d);
    alert(d.content ? '✅ API key working!\n\n' + txt : '❌ Error: ' + txt);
  } catch(e) { alert('❌ Network error: ' + e.message); }
  btn.textContent = '🔑 Test API Key'; btn.disabled = false;
}

async function toggleRole(uid, currentRole) {
  const newRole = currentRole === 'admin' ? 'user' : 'admin';
  const { error } = await db.from('profiles').update({ role: newRole }).eq('id', uid);
  if (!error) renderAdmin(el('main-area'));
}

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff/60000), h = Math.floor(m/60), d = Math.floor(h/24);
  return d > 0 ? d+'d ago' : h > 0 ? h+'h ago' : m > 0 ? m+'m ago' : 'just now';
}

// ── Boot ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (typeof supabase === 'undefined') {
    el('auth').innerHTML = '<div style="color:var(--err);text-align:center;padding:40px">Failed to load. Please refresh.</div>';
    return;
  }
  db = supabase.createClient(SB_URL, SB_KEY);
  // Check existing session first (instant if cookie exists)
  db.auth.getSession().then(({ data: { session } }) => {
    if (session?.user) loadAndShowApp(session.user);
  });
  // Listen for auth changes (login / logout)
  db.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session?.user)  loadAndShowApp(session.user);
    if (event === 'SIGNED_OUT') {
      CU = null; CP = null;
      el('app').style.display  = 'none';
      el('auth').style.display = 'flex';
    }
  });
});
</script>
</body>
</html>
